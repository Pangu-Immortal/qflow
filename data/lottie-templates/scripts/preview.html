<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lottie 动画预览</title>
    <!-- 引入 lottie-web CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <style>
        /* 全局重置与暗色主题 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px;
        }
        /* 标题区域 */
        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 24px;
            color: #a29bfe;
        }
        /* 文件加载区域 */
        .file-loader {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .file-input-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: #6c5ce7;
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        .file-input-label:hover {
            background: #5a4bd1;
        }
        .file-input-label input {
            display: none;
        }
        .file-name {
            font-size: 13px;
            color: #888;
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        /* 预览容器 */
        .preview-wrapper {
            position: relative;
            width: 400px;
            height: 400px;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 24px;
            /* 棋盘格透明背景 */
            background-image:
                linear-gradient(45deg, #2a2a3e 25%, transparent 25%),
                linear-gradient(-45deg, #2a2a3e 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #2a2a3e 75%),
                linear-gradient(-45deg, transparent 75%, #2a2a3e 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0;
            background-color: #222240;
            border: 2px solid #333;
        }
        /* 动画渲染区域 */
        #lottie-container {
            width: 100%;
            height: 100%;
        }
        /* 空状态提示 */
        .empty-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #666;
            font-size: 14px;
            pointer-events: none;
        }
        .empty-hint .icon {
            font-size: 48px;
            margin-bottom: 12px;
            display: block;
        }
        /* 播放控制栏 */
        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            padding: 8px 18px;
            border: 1px solid #444;
            background: #2a2a3e;
            color: #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .btn:hover {
            background: #3a3a50;
            border-color: #6c5ce7;
        }
        .btn.active {
            background: #6c5ce7;
            border-color: #6c5ce7;
            color: #fff;
        }
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .divider {
            width: 1px;
            height: 24px;
            background: #444;
        }
        /* 进度条 */
        .progress-wrapper {
            width: 400px;
            margin-bottom: 24px;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #2a2a3e;
            border-radius: 3px;
            cursor: pointer;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            background: #6c5ce7;
            border-radius: 3px;
            width: 0%;
            transition: width 0.05s linear;
        }
        .frame-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }
        /* 动画信息面板 */
        .info-panel {
            background: #16162a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 16px 24px;
            width: 400px;
        }
        .info-panel h3 {
            font-size: 14px;
            color: #a29bfe;
            margin-bottom: 12px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .info-item {
            font-size: 13px;
        }
        .info-item .label {
            color: #888;
        }
        .info-item .value {
            color: #e0e0e0;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <h1>🎬 Lottie 动画预览</h1>

    <!-- 文件加载 -->
    <div class="file-loader">
        <label class="file-input-label">
            📂 选择 JSON 文件
            <input type="file" id="fileInput" accept=".json">
        </label>
        <span class="file-name" id="fileName">未选择文件</span>
    </div>

    <!-- 预览区域 -->
    <div class="preview-wrapper">
        <div id="lottie-container"></div>
        <div class="empty-hint" id="emptyHint">
            <span class="icon">🎞️</span>
            选择一个 Lottie JSON 文件开始预览
        </div>
    </div>

    <!-- 进度条 -->
    <div class="progress-wrapper" id="progressWrapper" style="display: none;">
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="frame-info">
            <span id="currentFrame">帧: 0</span>
            <span id="totalFrames">总帧: 0</span>
        </div>
    </div>

    <!-- 播放控制 -->
    <div class="controls">
        <button class="btn" id="btnPlay" disabled>▶ 播放</button>
        <button class="btn" id="btnPause" disabled>⏸ 暂停</button>
        <button class="btn" id="btnStop" disabled>⏹ 停止</button>
        <div class="divider"></div>
        <button class="btn" id="btnSpeed05" disabled>0.5x</button>
        <button class="btn active" id="btnSpeed1" disabled>1x</button>
        <button class="btn" id="btnSpeed2" disabled>2x</button>
        <div class="divider"></div>
        <button class="btn" id="btnLoop" disabled>🔁 循环: 开</button>
    </div>

    <!-- 动画信息 -->
    <div class="info-panel" id="infoPanel" style="display: none;">
        <h3>📊 动画信息</h3>
        <div class="info-grid">
            <div class="info-item">
                <span class="label">尺寸: </span>
                <span class="value" id="infoDimensions">-</span>
            </div>
            <div class="info-item">
                <span class="label">帧率: </span>
                <span class="value" id="infoFps">-</span>
            </div>
            <div class="info-item">
                <span class="label">时长: </span>
                <span class="value" id="infoDuration">-</span>
            </div>
            <div class="info-item">
                <span class="label">帧范围: </span>
                <span class="value" id="infoFrames">-</span>
            </div>
            <div class="info-item">
                <span class="label">图层数: </span>
                <span class="value" id="infoLayers">-</span>
            </div>
            <div class="info-item">
                <span class="label">版本: </span>
                <span class="value" id="infoVersion">-</span>
            </div>
        </div>
    </div>

    <script>
        /**
         * Lottie 动画预览控制器
         * 功能：加载 JSON 文件、播放控制、速度调节、信息展示
         */

        // 全局状态
        let animInstance = null;   // Lottie 动画实例
        let isLooping = true;      // 是否循环播放
        let currentSpeed = 1;      // 当前播放速度
        let animData = null;       // 原始动画数据

        // DOM 元素引用
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const container = document.getElementById('lottie-container');
        const emptyHint = document.getElementById('emptyHint');
        const progressWrapper = document.getElementById('progressWrapper');
        const progressFill = document.getElementById('progressFill');
        const progressBar = document.getElementById('progressBar');
        const currentFrameEl = document.getElementById('currentFrame');
        const totalFramesEl = document.getElementById('totalFrames');
        const infoPanel = document.getElementById('infoPanel');
        const btnPlay = document.getElementById('btnPlay');
        const btnPause = document.getElementById('btnPause');
        const btnStop = document.getElementById('btnStop');
        const btnSpeed05 = document.getElementById('btnSpeed05');
        const btnSpeed1 = document.getElementById('btnSpeed1');
        const btnSpeed2 = document.getElementById('btnSpeed2');
        const btnLoop = document.getElementById('btnLoop');

        /**
         * 加载并渲染 Lottie 动画数据
         * @param {Object} data - 解析后的 Lottie JSON 对象
         * @param {string} name - 文件名（用于显示）
         */
        function loadAnimation(data, name) {
            // 保存原始数据
            animData = data;

            // 销毁已有动画实例
            if (animInstance) {
                animInstance.destroy();
                animInstance = null;
            }

            // 隐藏空状态提示
            emptyHint.style.display = 'none';

            // 创建新动画实例
            animInstance = lottie.loadAnimation({
                container: container,
                renderer: 'svg',           // SVG 渲染器，兼容性最佳
                loop: isLooping,
                autoplay: true,
                animationData: data
            });

            // 设置当前速度
            animInstance.setSpeed(currentSpeed);

            // 更新文件名显示
            fileName.textContent = name;

            // 启用所有控制按钮
            enableControls(true);

            // 显示进度条和信息面板
            progressWrapper.style.display = 'block';
            infoPanel.style.display = 'block';

            // 更新动画信息
            updateAnimInfo(data);

            // 帧更新监听
            const totalFrames = data.op - data.ip;
            totalFramesEl.textContent = `总帧: ${totalFrames}`;
            animInstance.addEventListener('enterFrame', function (e) {
                // 更新进度条
                const progress = (e.currentTime / totalFrames) * 100;
                progressFill.style.width = progress + '%';
                currentFrameEl.textContent = `帧: ${Math.round(e.currentTime)}`;
            });

            console.log(`[Lottie预览] 已加载动画: ${name}, ${data.w}×${data.h}, ${data.fr}fps`);
        }

        /**
         * 更新动画信息面板
         * @param {Object} data - Lottie JSON 数据
         */
        function updateAnimInfo(data) {
            document.getElementById('infoDimensions').textContent = `${data.w} × ${data.h}`;
            document.getElementById('infoFps').textContent = `${data.fr} fps`;
            // 计算时长
            const frames = data.op - data.ip;
            const duration = (frames / data.fr).toFixed(2);
            document.getElementById('infoDuration').textContent = `${duration}s`;
            document.getElementById('infoFrames').textContent = `${data.ip} - ${data.op}`;
            // 图层数
            const layerCount = data.layers ? data.layers.length : 0;
            document.getElementById('infoLayers').textContent = `${layerCount}`;
            // 版本
            document.getElementById('infoVersion').textContent = data.v || '-';
        }

        /**
         * 启用或禁用所有控制按钮
         * @param {boolean} enabled - 是否启用
         */
        function enableControls(enabled) {
            const buttons = [btnPlay, btnPause, btnStop, btnSpeed05, btnSpeed1, btnSpeed2, btnLoop];
            buttons.forEach(function (btn) {
                btn.disabled = !enabled;
            });
        }

        /**
         * 设置播放速度并更新按钮状态
         * @param {number} speed - 播放速度倍率
         */
        function setSpeed(speed) {
            currentSpeed = speed;
            if (animInstance) {
                animInstance.setSpeed(speed);
            }
            // 更新速度按钮高亮
            btnSpeed05.classList.toggle('active', speed === 0.5);
            btnSpeed1.classList.toggle('active', speed === 1);
            btnSpeed2.classList.toggle('active', speed === 2);
            console.log(`[Lottie预览] 播放速度: ${speed}x`);
        }

        // --- 事件绑定 ---

        // 文件选择
        fileInput.addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (event) {
                try {
                    // 解析 JSON 数据
                    const data = JSON.parse(event.target.result);
                    loadAnimation(data, file.name);
                } catch (err) {
                    alert('JSON 解析失败: ' + err.message);
                    console.error('[Lottie预览] JSON 解析错误:', err);
                }
            };
            reader.readAsText(file);
        });

        // 播放按钮
        btnPlay.addEventListener('click', function () {
            if (animInstance) {
                animInstance.play();
                console.log('[Lottie预览] 播放');
            }
        });

        // 暂停按钮
        btnPause.addEventListener('click', function () {
            if (animInstance) {
                animInstance.pause();
                console.log('[Lottie预览] 暂停');
            }
        });

        // 停止按钮
        btnStop.addEventListener('click', function () {
            if (animInstance) {
                animInstance.stop();
                progressFill.style.width = '0%';
                currentFrameEl.textContent = '帧: 0';
                console.log('[Lottie预览] 停止');
            }
        });

        // 速度按钮
        btnSpeed05.addEventListener('click', function () { setSpeed(0.5); });
        btnSpeed1.addEventListener('click', function () { setSpeed(1); });
        btnSpeed2.addEventListener('click', function () { setSpeed(2); });

        // 循环切换按钮
        btnLoop.addEventListener('click', function () {
            isLooping = !isLooping;
            btnLoop.textContent = isLooping ? '🔁 循环: 开' : '🔁 循环: 关';
            if (animInstance) {
                animInstance.loop = isLooping;
            }
            console.log(`[Lottie预览] 循环: ${isLooping ? '开' : '关'}`);
        });

        // 进度条点击跳转
        progressBar.addEventListener('click', function (e) {
            if (!animInstance || !animData) return;
            // 计算点击位置对应的帧数
            const rect = progressBar.getBoundingClientRect();
            const ratio = (e.clientX - rect.left) / rect.width;
            const totalFrames = animData.op - animData.ip;
            const targetFrame = Math.round(ratio * totalFrames);
            animInstance.goToAndPlay(targetFrame, true);
            console.log(`[Lottie预览] 跳转到帧: ${targetFrame}`);
        });

        // --- URL 参数加载支持 ---
        (function () {
            // 检查 URL 参数中是否有 file 路径
            const params = new URLSearchParams(window.location.search);
            const fileUrl = params.get('file');
            if (fileUrl) {
                console.log(`[Lottie预览] 从 URL 参数加载: ${fileUrl}`);
                fetch(fileUrl)
                    .then(function (res) {
                        if (!res.ok) throw new Error('HTTP ' + res.status);
                        return res.json();
                    })
                    .then(function (data) {
                        // 从 URL 中提取文件名
                        const name = fileUrl.split('/').pop() || 'animation.json';
                        loadAnimation(data, name);
                    })
                    .catch(function (err) {
                        console.error('[Lottie预览] URL 加载失败:', err);
                        alert('从 URL 加载失败: ' + err.message);
                    });
            }
        })();
    </script>
</body>
</html>
